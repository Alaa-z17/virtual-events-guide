   <main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center mb-5">
            <h1 class="fw-bold text-primary">تواصل معنا</h1>
            <p class="text-muted">لديك استفسار عن فعالية معينة؟ نحن هنا لمساعدتك.</p>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm border-0 p-4">
                <form>
                    <div class="mb-3 text-end">
                        <label for="name" class="form-label">الاسم الكامل</label>
                        <input type="text" class="form-control" id="name" placeholder="أدخل اسمك هنا" required>
                    </div>
                    
                    <div class="mb-3 text-end">
                        <label for="email" class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3 text-end">
                        <label for="subject" class="form-label">الموضوع</label>
                        <select class="form-select" id="subject">
                            <option selected>استفسار عام</option>
                            <option value="1">تسجيل في فعالية</option>
                            <option value="2">اقتراح فعالية جديدة</option>
                            <option value="3">مشكلة تقنية</option>
                        </select>
                    </div>

                    <div class="mb-3 text-end">
                        <label for="message" class="form-label">رسالتك</label>
                        <textarea class="form-control" id="message" rows="5" placeholder="اكتب تفاصيل استفسارك هنا..." required></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">إرسال الرسالة</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
